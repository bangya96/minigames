name: Deploy MiniJoy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=minigames

  notify-telegram:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [[ "$DEPLOY_RESULT" == "success" ]]; then
            STATUS="Deploy Berjaya"
            EMOJI="🚀"
          else
            STATUS="Deploy Gagal"
            EMOJI="🔴"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          COMMIT_URL="https://github.com/$REPO/commit/$COMMIT_SHA"
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)

          PAYLOAD=$(cat <<ENDL
          {"chat_id":"$TELEGRAM_CHAT_ID","parse_mode":"HTML","disable_web_page_preview":true,"text":"$EMOJI <b>$STATUS<\/b>\n\n<b>Project:<\/b> MiniJoy\n<b>Branch:<\/b> $BRANCH\n<b>Commit:<\/b> <a href=\\\"$COMMIT_URL\\\">$SHORT_SHA<\/a>\n<b>Message:<\/b> $COMMIT_MSG\n\n🌐 <a href=\\\"https://kids.bangya.my\\\">kids.bangya.my<\/a>\n<a href=\\\"$RUN_URL\\\">View Details →<\/a>"}
          ENDL
          )

          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
