name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=minigames

  notify-telegram:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="✅ Deploy Berjaya"
            EMOJI="🚀"
          else
            STATUS="❌ Deploy Gagal"
            EMOJI="🔴"
          fi

          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"

          MESSAGE="${EMOJI} <b>${STATUS}</b>

<b>Project:</b> MiniJoy
<b>Branch:</b> ${{ github.ref_name }}
<b>Commit:</b> <a href=\"${COMMIT_URL}\">${SHORT_SHA}</a>
<b>Message:</b> ${COMMIT_MSG}

🌐 <a href=\"https://kids.bangya.my\">kids.bangya.my</a>
<a href=\"${RUN_URL}\">View Details →</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="${MESSAGE}" \
            -d disable_web_page_preview=true
